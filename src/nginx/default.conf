# ── El mapa del aventurero (microservicios) — Nginx front-end ─────────────────────
# Sirve el front estático de gateway/public y reenvía la API y los
# WebSockets al API gateway (servicio interno "gateway:8080").

server {
    listen 80;
    server_name _;

    # Resolver DNS interno de Docker. Con un proxy_pass por variable, nginx
    # resuelve el host en cada petición (no al arrancar), así NO falla aunque
    # el gateway todavía no esté listo (evita "host not found in upstream").
    resolver 127.0.0.11 valid=10s ipv6=off;

    root  /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;

    # ── API REST (HTTP plano hacia el gateway) ────────────────────
    location /api/ {
        set                $upstream_gw gateway;
        proxy_pass         http://$upstream_gw:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSockets del modo mazmorra (Socket.IO) ──────────────────
    location /socket.io/ {
        set                $upstream_gw gateway;
        proxy_pass         http://$upstream_gw:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── PWA estática + fallback SPA ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
